<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef1f7;
      margin: 20px;
    }
    h1, h2 {
      text-align: center;
    }
    .category-box {
      background: #fff;
      margin-bottom: 40px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .item-card {
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    }
    .item-card img {
      width: 100%;
      height: 150px;
      object-fit: contain;
      border-radius: 6px;
    }
    .item-card h4 {
      margin: 10px 0;
    }
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
    .btn {
      padding: 5px 10px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    .count {
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>IoT Inventory Dashboard</h1>

  {% for category, items in categories.items %}
    <div class="category-box">
      <h2>{{ category }}</h2>
      <div class="items-grid">
        {% for item in items %}
          <div class="item-card" id="item-{{ item.id }}">
            <img src="{{ item.image_url }}" alt="{{ item.name }}">
            <h4>{{ item.name }}</h4>
            <div class="controls">
              <button class="btn" onclick="decrement({{ item.id }})">−</button>
              <span class="count" id="count-{{ item.id }}">{{ item.quantity }}</span>
              <button class="btn" onclick="increment({{ item.id }})">+</button>
            </div>
          </div>
        {% endfor %}
      </div>
    </div>
  {% endfor %}

<script>
  function increment(id) {
    const countEl = document.getElementById('count-' + id);
    let value = parseInt(countEl.innerText);
    value++;
    countEl.innerText = value;
    // Optionally send to backend via fetch() or AJAX
  }

  function decrement(id) {
    const countEl = document.getElementById('count-' + id);
    let value = parseInt(countEl.innerText);
    if (value > 0) value--;
    countEl.innerText = value;
    // Optionally send to backend via fetch() or AJAX
  }
</script>

</body>
</html>
